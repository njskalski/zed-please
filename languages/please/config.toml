name = "Please Build"
grammar = "please"
path_suffixes = ["build_defs", "build_defs.plz"]
line_comments = ["# "]
tab_size = 4
hard_tabs = false

# Match BUILD / BUILD.plz files by their first line content.
# Common openers in Please BUILD files:
#   subinclude("...")
#   # please build file / plz build
#   go_library(  go_binary(  go_test(  filegroup(  genrule(  etc.
# This pattern beats Python's extension-based detection for BUILD files.
first_line_pattern = "^(subinclude|filegroup|genrule|go_library|go_binary|go_test|go_module|python_library|python_binary|python_test|java_library|java_binary|cc_library|cc_binary|remote_file|export_file|sh_cmd|sh_library|build_rule|# (please|plz|Please|BUILD))"

brackets = [
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]
